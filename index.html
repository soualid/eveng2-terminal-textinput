<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>eveng2-terminal-textinput</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #2d333b;
    --fg: #e6edf3; --dim: #8b949e; --accent: #4bb7c3;
    --user: #1f3d45; --green: #3fb950; --red: #f85149; --amber: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font: 15px/1.45 -apple-system, "SF Pro Text", system-ui, sans-serif;
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  header .title { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header .sub { color: var(--dim); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #instSel {
    display: block; width: 100%; background: none; border: none; padding: 0;
    color: var(--accent); font-size: 12px; font-family: inherit;
  }
  button {
    background: var(--panel); color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { background: var(--border); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #06262b; font-weight: 600; }
  button:disabled { opacity: .45; }
  .chip { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--dim); flex-shrink: 0; }
  #scrollBtn.on { color: var(--accent); border-color: var(--accent); }
  .chip.busy { color: var(--amber); border-color: var(--amber); }
  .chip.idle { color: var(--green); border-color: var(--green); }
  .chip.waiting { color: var(--accent); border-color: var(--accent); }

  main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* ---- global bar ---- */
  .gbar {
    display: flex; gap: 8px; padding: 12px 14px; overflow-x: auto;
    border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch;
  }
  .gpill {
    display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
    padding: 6px 11px; border-radius: 999px; font-size: 13px;
    border: 1px solid var(--border); background: var(--bg); color: var(--dim);
  }
  .gpill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .gpill.busy { color: var(--fg); border-color: var(--amber); }
  .gpill.busy .dot { background: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
  .gpill .n {
    font-size: 11px; font-weight: 600; color: #06262b; background: var(--amber);
    border-radius: 999px; padding: 0 6px; min-width: 16px; text-align: center;
  }
  .gpill.active { border-color: var(--accent); color: var(--fg); box-shadow: inset 0 0 0 1px var(--accent); }

  /* ---- session list ---- */
  #sessionList .proj { color: var(--accent); }
  #sessionList .pre {
    color: var(--amber); font-size: 12px; margin-top: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #sessionList .row {
    padding: 13px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; cursor: pointer;
  }
  #sessionList .row:active { background: var(--panel); }
  #sessionList .row.muted { opacity: .4; }
  .kebab {
    flex-shrink: 0; border: none; background: none; color: var(--dim);
    padding: 4px 6px; font-size: 18px; line-height: 1;
  }
  .kebab:active { background: var(--border); }
  .unarch { flex-shrink: 0; font-size: 12px; padding: 6px 10px; color: var(--accent); }
  .menu {
    position: fixed; z-index: 50; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; padding: 4px;
    display: flex; flex-direction: column; min-width: 150px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
  }
  .menu button {
    text-align: left; border: none; background: none; color: var(--fg);
    padding: 10px 12px; border-radius: 6px; font-size: 14px;
  }
  .menu button:active { background: var(--border); }
  .footer {
    padding: 14px; text-align: center; color: var(--accent);
    font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border);
  }
  .footer:active { background: var(--panel); }
  #sessionList .meta { flex: 1; min-width: 0; }
  #sessionList .t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #sessionList .d { color: var(--dim); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { padding: 32px 16px; text-align: center; color: var(--dim); }

  /* ---- transcript ---- */
  #transcript { padding: 12px 12px 4px; display: flex; flex-direction: column; gap: 8px; }
  .bubble { border-radius: 12px; padding: 9px 12px; max-width: 92%; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
  .bubble.user { background: var(--user); align-self: flex-end; }
  .bubble.assistant { background: var(--panel); align-self: flex-start; }
  .bubble.dim { opacity: .55; }

  /* ---- markdown (assistant bubbles) ---- */
  .bubble.md { white-space: normal; }
  .bubble.md p { margin: 6px 0; }
  .bubble.md h1, .bubble.md h2, .bubble.md h3, .bubble.md h4, .bubble.md h5, .bubble.md h6 {
    margin: 10px 0 4px; line-height: 1.3; font-size: 1em; }
  .bubble.md h1 { font-size: 1.25em; }
  .bubble.md h2 { font-size: 1.15em; }
  .bubble.md h3 { font-size: 1.05em; }
  .bubble.md ul, .bubble.md ol { margin: 6px 0; padding-left: 22px; }
  .bubble.md li { margin: 3px 0; }
  .bubble.md code { background: rgba(110, 118, 129, .25); border-radius: 4px; padding: 1px 5px;
                    font: 12.5px ui-monospace, SFMono-Regular, Menlo, monospace; }
  .bubble.md pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
                   padding: 8px 10px; margin: 6px 0; overflow-x: auto; }
  .bubble.md pre code { background: none; padding: 0; font-size: 12px; white-space: pre; }
  .bubble.md blockquote { border-left: 3px solid var(--border); margin: 6px 0; padding: 2px 10px; color: var(--dim); }
  .bubble.md a { color: var(--accent); }
  .bubble.md hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .bubble.md table { border-collapse: collapse; margin: 6px 0; font-size: 13px;
                     display: block; overflow-x: auto; max-width: 100%; }
  .bubble.md th, .bubble.md td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
  .bubble.md th { background: var(--bg); }
  .bubble.md > :first-child { margin-top: 0; }
  .bubble.md > :last-child { margin-bottom: 0; }
  .mermaid-box.rendered { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
                          padding: 8px; margin: 6px 0; overflow-x: auto; text-align: center; }
  .mermaid-box svg { max-width: 100%; height: auto; }
  .line { color: var(--dim); font-size: 12.5px; padding: 0 4px; word-break: break-word; }
  .line.err { color: var(--red); }
  .line.thinking { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  .tool { font-size: 12.5px; color: var(--dim); background: var(--panel); border: 1px solid var(--border);
          border-radius: 8px; padding: 6px 10px; align-self: flex-start; max-width: 92%; cursor: pointer; }
  .tool .spin::after { content: "…"; }
  .tool pre { margin-top: 6px; font-size: 11px; color: var(--fg); overflow-x: auto; max-height: 200px; overflow-y: auto; display: none; }
  .tool.open pre { display: block; }
  .card { background: var(--panel); border: 1px solid var(--accent); border-radius: 12px; padding: 12px; }
  .card h4 { font-size: 13px; margin-bottom: 4px; color: var(--accent); }
  .card p { font-size: 13.5px; margin-bottom: 10px; white-space: pre-wrap; }
  .card .opts { display: flex; flex-direction: column; gap: 8px; }
  .card .opts button { text-align: left; }
  .card .opts button small { display: block; color: var(--dim); font-weight: 400; }
  .card.done { border-color: var(--border); opacity: .6; }
  .result { font-size: 11.5px; color: var(--dim); text-align: center; padding: 4px 0 8px; }

  /* ---- composer ---- */
  #composer {
    display: none; gap: 8px; align-items: flex-end; flex-shrink: 0;
    padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px);
    background: var(--panel); border-top: 1px solid var(--border);
  }
  #composer textarea {
    flex: 1; resize: none; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px;
    font: inherit; max-height: 130px; min-height: 40px;
  }
  #composer textarea:focus { outline: none; border-color: var(--accent); }
  #attachBtn { flex-shrink: 0; padding: 8px 10px; font-size: 18px; line-height: 1; }
  #attachments {
    display: none; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
    padding: 8px 10px 0; background: var(--panel);
  }
  .att { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
  .att img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
  .att.file {
    width: auto; max-width: 150px; display: flex; align-items: center; gap: 6px;
    padding: 0 10px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); font-size: 12px;
  }
  .att.file .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .att.up { opacity: .5; }
  .att.err img { border-color: var(--red); }
  .att.err.file { border-color: var(--red); }
  .att .x {
    position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
    padding: 0; border-radius: 50%; font-size: 11px; line-height: 1;
    background: var(--bg); border: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <button id="backBtn" style="display:none" title="Back to the list">‹</button>
  <div style="flex:1;min-width:0">
    <div class="title" id="hTitle">Even Terminal — text input</div>
    <div class="sub" id="hSub" style="display:none"></div>
    <select id="instSel"><option>connecting…</option></select>
  </div>
  <span class="chip" id="statusChip" style="display:none">idle</span>
  <button id="scrollBtn" style="display:none" title="Follow new messages (tap to jump to the bottom)">⇣</button>
  <button id="archBtn" style="display:none" title="Archive this conversation">🗄</button>
  <button id="stopBtn" style="display:none" title="Interrupt Claude">■</button>
  <button id="refreshBtn" title="Refresh">↻</button>
  <button id="newBtn" class="primary" title="New session">＋</button>
</header>

<main id="main">
  <div id="sessionList"></div>
  <div id="transcript" style="display:none"></div>
</main>

<div id="attachments"></div>
<div id="composer">
  <input id="fileInput" type="file" accept="image/*,.zip,application/zip,application/x-zip-compressed" multiple hidden>
  <button id="attachBtn" title="Attach a screenshot or zip">📎</button>
  <textarea id="input" rows="1" placeholder="Message Claude… (Ctrl+Enter to send)"></textarea>
  <button id="sendBtn" class="primary" title="Send (Ctrl+Enter)">Send</button>
</div>

<script>
'use strict'
const $ = (id) => document.getElementById(id)
// Every /api/* call is stamped with the selected even-terminal instance
const withInst = (path) => {
  const i = currentInst()
  if (!i || !path.startsWith('/api/')) return path
  return path + (path.includes('?') ? '&' : '?') + '_inst=' + i.port
}
const api = (path, opts) => fetch(withInst(path), opts).then(async (r) => {
  const body = await r.json().catch(() => ({}))
  if (!r.ok && !(r.status === 202)) throw new Error(body.error || r.status)
  return body
})
const post = (path, body) => api(path, {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(body),
})

let instances = []           // live even-terminal instances
// scope drives the list: 'all' aggregates every instance, or a port number
// filters to one. Sessions are always fetched from all instances so the
// global bar reflects everything regardless of the current filter.
let scope = localStorage.getItem('scope') || 'all'
let allSessions = []         // aggregated sessions, each tagged with _port/_proj
let curPort = null           // port of the open session (or new-session target)
let pollTimer = null

// User overrides for even-terminal's last-line busy heuristic, which can
// misreport a stalled/interrupted session as busy.
// done: id -> timestamp at which the user marked it done. Keyed by timestamp
// so the override auto-expires if the session genuinely advances again.
let doneMap = JSON.parse(localStorage.getItem('done') || '{}')
// Archived conversations: id -> { title, proj, ts } snapshot, so the Archives
// view can render them even once they drop out of the recent-sessions fetch.
// Archived sessions never show on the main screen and can't be opened.
let archived = JSON.parse(localStorage.getItem('archived') || '{}')
// Migrate the old flat "hidden" set into archives (metadata unknown).
try {
  const old = JSON.parse(localStorage.getItem('hidden') || '[]')
  if (old.length) {
    for (const id of old) if (!archived[id]) archived[id] = { title: null, proj: null, ts: null }
    localStorage.removeItem('hidden')
    localStorage.setItem('archived', JSON.stringify(archived))
  }
} catch { /* ignore */ }
// Custom titles: id -> title. even-terminal has no rename API (titles come
// from the session file), so renames live here and shadow the fetched title.
let titleMap = JSON.parse(localStorage.getItem('titles') || '{}')

// Overrides are persisted on the companion (~/.even-terminal/) so every
// device sees the same archives/titles. localStorage is kept as a cache for
// when the companion state hasn't loaded yet (or the fetch fails).
function cacheOverrides() {
  localStorage.setItem('done', JSON.stringify(doneMap))
  localStorage.setItem('archived', JSON.stringify(archived))
  localStorage.setItem('titles', JSON.stringify(titleMap))
}
let pushing = 0   // PUTs in flight — pause adoption so a poll can't revert them
function saveOverrides() {
  cacheOverrides()
  pushing++
  fetch('/companion/overrides', {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ done: doneMap, archived, titles: titleMap }),
  }).catch(() => { /* offline — the local cache still has it */ })
    .finally(() => pushing--)
}
async function loadOverrides() {
  if (pushing) return
  try {
    const r = await fetch('/companion/overrides')
    if (!r.ok) return
    const srv = await r.json()
    if (!localStorage.getItem('overridesSynced')) {
      // First contact from this device: merge its local data into the shared
      // state (server wins on conflicts) and upload the result.
      doneMap = { ...doneMap, ...(srv.done || {}) }
      archived = { ...archived, ...(srv.archived || {}) }
      titleMap = { ...titleMap, ...(srv.titles || {}) }
      localStorage.setItem('overridesSynced', '1')
      saveOverrides()
    } else {
      // Afterwards the server is the source of truth, so unarchives and
      // title resets made on another device propagate here too.
      doneMap = srv.done || {}
      archived = srv.archived || {}
      titleMap = srv.titles || {}
      cacheOverrides()
    }
  } catch { /* companion unreachable — keep the cached copy */ }
}
function dispTitle(s) {
  return titleMap[s.id] || s.title || s.id.slice(0, 8)
}
// Prompt-based rename shared by the row menu and the session header.
// Empty input (or the original title) clears the override. Returns the new
// display title, or null if the user cancelled.
function renameSession(id, origTitle, currentShown) {
  const t = prompt('Session title', currentShown || '')
  if (t === null) return null
  const v = t.trim()
  if (!v || v === (origTitle || '')) delete titleMap[id]
  else titleMap[id] = v
  saveOverrides()
  return titleMap[id] || origTitle || id.slice(0, 8)
}
function effStatus(s) {
  return (s.status === 'busy' && doneMap[s.id] === s.timestamp) ? 'idle' : s.status
}
let view = null              // 'list' | 'session' | 'archived'
let current = null           // open sessionId (null = list view)
let es = null                // EventSource
let curAssistant = null      // assistant bubble currently streaming
let turnHadText = false
let pendingCwd = null        // cwd of a new session awaiting its id

// ---------- header / navigation ----------
function showList() {
  view = 'list'
  current = null
  if (es) { es.close(); es = null }
  $('transcript').style.display = 'none'
  $('sessionList').style.display = ''
  $('composer').style.display = 'none'
  $('backBtn').style.display = 'none'
  $('scrollBtn').style.display = 'none'
  $('archBtn').style.display = 'none'
  $('stopBtn').style.display = 'none'
  $('statusChip').style.display = 'none'
  $('newBtn').style.display = ''
  $('hTitle').textContent = 'Even Terminal — text input'
  $('hTitle').removeAttribute('title')
  $('hSub').style.display = 'none'
  $('instSel').style.display = ''
  $('instSel').value = scope
  $('main').scrollTop = 0     // coming back from a session: land at the top
  setHash(`#/${scope}`)
  startPolling()
  loadSessions()
}

function showSession(id, title) {
  view = 'session'
  stopPolling()
  current = id                       // null for a session not created yet
  $('sessionList').style.display = 'none'
  $('transcript').style.display = ''
  $('transcript').innerHTML = ''
  $('composer').style.display = 'flex'
  $('backBtn').style.display = ''
  $('scrollBtn').style.display = ''
  $('archBtn').style.display = id ? '' : 'none'   // nothing to archive before the session exists
  $('stopBtn').style.display = ''
  $('statusChip').style.display = ''
  $('newBtn').style.display = 'none'
  $('hTitle').textContent = title || 'New session'
  $('hTitle').title = 'Tap to rename'
  $('instSel').style.display = 'none'
  $('hSub').style.display = ''
  const inst = currentInst()
  $('hSub').textContent = (id ? id.slice(0, 8) : (pendingCwd || (inst && inst.cwd) || '')) +
    (inst ? ` · :${inst.port}` : '')
  setChip('idle')
  curAssistant = null
  thinkingEl = null   // transcript was cleared with innerHTML above
  stick = true        // always land at the bottom when joining a session
  updateScrollBtn()
  if (id) {
    setHash(`#/${curPort}/${id}${title ? '/' + slug(title) : ''}`)
    attach(id)
  }
  $('input').focus()
}

function setChip(state) {
  const c = $('statusChip')
  c.textContent = state
  c.className = 'chip ' + state
}

// ---------- instances ----------
// Active instance = the open session's port in session view, else the scope
// filter (null when scope is 'all').
function currentInst() {
  const p = view === 'session' ? curPort : (scope === 'all' ? null : Number(scope))
  return instances.find((i) => i.port === p) || null
}
function projName(inst) {
  return (shortPath(inst.cwd).split('/').pop() || inst.cwd || '?')
}

async function loadInstances() {
  try {
    instances = await fetch('/companion/instances').then((r) => r.json())
  } catch { instances = [] }
  // Keep scope valid: fall back to 'all' if the filtered instance vanished.
  if (scope !== 'all' && !instances.find((i) => i.port === Number(scope))) scope = 'all'
  const sel = $('instSel')
  sel.innerHTML = ''
  if (!instances.length) {
    sel.appendChild(new Option('⚠ even-terminal is not running', ''))
    return
  }
  sel.appendChild(new Option('🌐 All projects ▾', 'all'))
  for (const i of instances) {
    sel.appendChild(new Option(`${projName(i)} · :${i.port} ▾`, String(i.port)))
  }
  sel.value = scope
}

$('instSel').onchange = () => {
  scope = $('instSel').value || 'all'
  localStorage.setItem('scope', scope)
  showList()
}

// Poll the global view so the pill bar stays live while browsing the list.
function startPolling() {
  stopPolling()
  pollTimer = setInterval(() => {
    if (view === 'list' && document.visibilityState === 'visible') loadOverrides().then(loadSessions)
  }, 5000)
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null }
}

// Returning to a backgrounded tab: pull the shared state right away so
// archives/renames made on another device show up without a manual ↻.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return
  loadOverrides().then(() => {
    if (view === 'list') loadSessions()
    else if (view === 'archived') renderArchived()
    else if (view === 'session' && current && titleMap[current]) $('hTitle').textContent = titleMap[current]
  })
})

// ---------- session list ----------
// Fetch every instance's sessions in parallel and tag each with its port /
// project, so both the global bar and the (optionally filtered) list can be
// built from one aggregated set.
async function loadSessions() {
  const box = $('sessionList')
  const firstPaint = !allSessions.length
  if (firstPaint) box.innerHTML = '<div class="empty">loading…</div>'
  if (!instances.length) { box.innerHTML = '<div class="empty">⚠ even-terminal is not running.</div>'; return }
  const per = await Promise.all(instances.map(async (inst) => {
    try {
      const r = await fetch(`/api/sessions?provider=claude&limit=20&_inst=${inst.port}`).then((x) => x.json())
      if (r.error) throw new Error(r.error)
      return (r.sessions || []).map((s) => ({ ...s, _port: inst.port, _proj: projName(inst) }))
    } catch { return [] }
  }))
  allSessions = per.flat().sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0))
  if (view === 'list') renderList()
}

function busyCount(port) {
  return allSessions.filter((s) =>
    (port == null || s._port === port) && !archived[s.id] && effStatus(s) === 'busy').length
}

function renderList() {
  const box = $('sessionList')
  box.innerHTML = ''

  // Global bar: one pill per instance (+ an "All" pill), showing running
  // counts and doubling as the scope filter.
  const bar = document.createElement('div')
  bar.className = 'gbar'
  const mkPill = (label, key, busy) => {
    const p = document.createElement('button')
    p.className = 'gpill' + (String(scope) === String(key) ? ' active' : '') + (busy ? ' busy' : '')
    p.innerHTML = `<span class="dot"></span>${esc(label)}` + (busy ? `<span class="n">${busy}</span>` : '')
    p.onclick = () => { scope = String(key); localStorage.setItem('scope', scope); $('instSel').value = scope; showList() }
    return p
  }
  bar.appendChild(mkPill('All', 'all', busyCount(null)))
  for (const i of instances) bar.appendChild(mkPill(projName(i), i.port, busyCount(i.port)))
  box.appendChild(bar)

  const scoped = scope === 'all' ? allSessions : allSessions.filter((s) => s._port === Number(scope))
  const rows = scoped.filter((s) => !archived[s.id])
  if (!rows.length) {
    box.insertAdjacentHTML('beforeend', '<div class="empty">No Claude Code sessions found.</div>')
  }
  for (const s of rows) {
    const st = effStatus(s)
    const row = document.createElement('div')
    row.className = 'row'
    const when = s.timestamp ? relTime(new Date(s.timestamp)) : ''
    row.innerHTML =
      `<div class="meta"><div class="t"></div>` +
      `<div class="d"><span class="proj">${esc(s._proj)}</span> · <span class="w"></span></div>` +
      (st === 'busy' ? `<div class="pre">…</div>` : '') +
      `</div>` +
      (st ? `<span class="chip ${esc(st)}">${esc(st)}</span>` : '') +
      `<button class="kebab" title="Actions">⋯</button>`
    row.querySelector('.t').textContent = dispTitle(s)
    row.querySelector('.w').textContent = when
    if (st === 'busy') fillLastLine(s, row.querySelector('.pre'))
    row.onclick = () => { curPort = s._port; showSession(s.id, dispTitle(s)) }
    row.querySelector('.kebab').onclick = (e) => { e.stopPropagation(); rowMenu(e.currentTarget, s) }
    box.appendChild(row)
  }

  // Footer: enter the Archives view.
  const nArch = Object.keys(archived).length
  if (nArch) {
    const f = document.createElement('div')
    f.className = 'footer'
    f.textContent = `🗄 Archived (${nArch})`
    f.onclick = showArchived
    box.appendChild(f)
  }
}

// Archives view: archived conversations across all instances, read-only
// except for unarchiving. Rendered from the stored snapshot so it works even
// after a session drops out of the recent-sessions fetch.
function showArchived() {
  view = 'archived'
  current = null
  if (es) { es.close(); es = null }
  stopPolling()
  $('transcript').style.display = 'none'
  $('sessionList').style.display = ''
  $('composer').style.display = 'none'
  $('backBtn').style.display = ''
  $('scrollBtn').style.display = 'none'
  $('archBtn').style.display = 'none'
  $('stopBtn').style.display = 'none'
  $('statusChip').style.display = 'none'
  $('newBtn').style.display = 'none'
  $('instSel').style.display = 'none'
  $('hSub').style.display = 'none'
  $('hTitle').textContent = 'Archives'
  $('hTitle').removeAttribute('title')
  setHash('#/archived')
  renderArchived()
}

function renderArchived() {
  const box = $('sessionList')
  box.innerHTML = ''
  const items = Object.entries(archived)
    .map(([id, m]) => ({ id, ...m }))
    .sort((a, b) => new Date(b.ts || 0) - new Date(a.ts || 0))
  if (!items.length) {
    box.innerHTML = '<div class="empty">No archived conversations.</div>'
    return
  }
  for (const it of items) {
    const row = document.createElement('div')
    row.className = 'row muted'
    const when = it.ts ? relTime(new Date(it.ts)) : ''
    row.innerHTML =
      `<div class="meta"><div class="t"></div>` +
      `<div class="d">${it.proj ? `<span class="proj">${esc(it.proj)}</span> · ` : ''}${esc(when)}</div></div>` +
      `<button class="unarch" title="Restore to the main list">Unarchive</button>`
    row.querySelector('.t').textContent = it.title || it.id.slice(0, 8)
    row.querySelector('.unarch').onclick = () => { delete archived[it.id]; saveOverrides(); renderArchived() }
    box.appendChild(row)
  }
}

// Tiny per-row action menu: mark a mislabeled session done, or archive it.
function rowMenu(anchor, s) {
  document.querySelector('.menu')?.remove()
  const m = document.createElement('div')
  m.className = 'menu'
  const add = (label, fn) => {
    const b = document.createElement('button')
    b.textContent = label
    b.onclick = (e) => { e.stopPropagation(); m.remove(); fn() }
    m.appendChild(b)
  }
  if (s.status === 'busy' && effStatus(s) === 'busy') {
    add('✓ Mark done', () => { doneMap[s.id] = s.timestamp; saveOverrides(); renderList() })
  }
  add('✏️ Rename', () => {
    if (renameSession(s.id, s.title, dispTitle(s)) !== null) renderList()
  })
  add('🗄 Archive', () => {
    archived[s.id] = { title: titleMap[s.id] || s.title || null, proj: s._proj || null, ts: s.timestamp || null }
    saveOverrides(); renderList()
  })
  const r = anchor.getBoundingClientRect()
  m.style.top = `${r.bottom + 4}px`
  m.style.right = `${window.innerWidth - r.right}px`
  document.body.appendChild(m)
  setTimeout(() => document.addEventListener('click', () => m.remove(), { once: true }), 0)
}

// Preview the latest line of a busy session, from its on-disk history (cheap,
// works for any instance). Cached by lastModified so the poll only refetches
// sessions that actually advanced.
const lineCache = new Map()
async function fillLastLine(s, el) {
  const hit = lineCache.get(s.id)
  if (hit && hit.ts === s.timestamp) { el.textContent = hit.text || '…'; return }
  try {
    const r = await fetch(`/api/sessions/${s.id}/history?provider=claude&limit=2&_inst=${s._port}`).then((x) => x.json())
    const last = (r.history || []).filter((h) => h.text && h.text.trim()).pop()
    let text = last ? last.text.trim().split('\n').map((l) => l.trim()).filter(Boolean).pop() : ''
    if (last && last.role === 'user') text = '› ' + text
    text = text.slice(0, 120)
    lineCache.set(s.id, { ts: s.timestamp, text })
    if (el.isConnected) el.textContent = text || '…'
  } catch { /* keep the placeholder */ }
}

function relTime(d) {
  const s = Math.floor((Date.now() - d.getTime()) / 1000)
  if (s < 60) return 'just now'
  if (s < 3600) return Math.floor(s / 60) + 'm ago'
  if (s < 86400) return Math.floor(s / 3600) + 'h ago'
  return Math.floor(s / 86400) + 'd ago'
}
function shortPath(p) { return (p || '').replace(/^\/Users\/[^/]+/, '~') }
function esc(t) {
  return String(t ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}

// ---------- markdown ----------
// Minimal dependency-free renderer: enough of GFM for agent replies
// (headings, nested lists, fenced code, tables, quotes, links, bold /
// italic / strike / inline code). Everything goes through esc() first, so
// no raw model output ever reaches innerHTML. ```mermaid fences render as
// diagrams once closed — see the mermaid section below.
function mdInline(s) {
  const codes = []
  s = String(s).replace(/`([^`\n]+)`/g, (_, c) => `\u0000${codes.push(c) - 1}\u0000`)
  s = esc(s)
  s = s.replace(/\[([^\]\n]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
  s = s.replace(/(^|\s)(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>')
  s = s.replace(/\*\*([^\n]+?)\*\*/g, '<strong>$1</strong>')
  s = s.replace(/\*(\S(?:[^*\n]*\S)?)\*/g, '<em>$1</em>')
  s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>')
  return s.replace(/\u0000(\d+)\u0000/g, (_, i) => `<code>${esc(codes[i])}</code>`)
}

// items: [{ind, ord, text}] — nesting is driven by leading-space depth.
function mdList(items) {
  if (!items.length) return ''
  const base = items[0].ind
  let out = items[0].ord ? '<ol>' : '<ul>'
  let k = 0
  while (k < items.length) {
    const it = items[k++]
    const kids = []
    while (k < items.length && items[k].ind > base) kids.push(items[k++])
    out += `<li>${mdInline(it.text)}${mdList(kids)}</li>`
  }
  return out + (items[0].ord ? '</ol>' : '</ul>')
}

function mdRender(src) {
  const lines = String(src ?? '').split('\n')
  const LI = /^(\s*)([-*+]|\d+[.)])\s+(.*)$/
  let html = ''
  let para = []
  let i = 0
  const flush = () => {
    if (para.length) { html += `<p>${para.map(mdInline).join('<br>')}</p>`; para = [] }
  }
  while (i < lines.length) {
    const l = lines[i]
    const fence = l.match(/^```(\S*)/)
    if (fence) {                                   // fenced code (maybe still streaming)
      flush()
      const buf = []
      let closed = false
      i++
      while (i < lines.length) {
        if (/^```\s*$/.test(lines[i])) { closed = true; i++; break }
        buf.push(lines[i++])
      }
      const code = buf.join('\n')
      if (fence[1].toLowerCase() === 'mermaid' && closed) {
        html += `<div class="mermaid-box" data-mmd="${esc(code)}"><pre><code>${esc(code)}</code></pre></div>`
      } else {
        html += `<pre><code>${esc(code)}</code></pre>`
      }
      continue
    }
    if (/^\s*$/.test(l)) { flush(); i++; continue }
    const h = l.match(/^(#{1,6})\s+(.*)$/)
    if (h) { flush(); html += `<h${h[1].length}>${mdInline(h[2])}</h${h[1].length}>`; i++; continue }
    if (/^ {0,3}(?:-{3,}|\*{3,}|_{3,})\s*$/.test(l)) { flush(); html += '<hr>'; i++; continue }
    if (/^\s*>/.test(l)) {                         // blockquote (recursive)
      flush()
      const q = []
      while (i < lines.length && /^\s*>/.test(lines[i])) q.push(lines[i++].replace(/^\s*>\s?/, ''))
      html += `<blockquote>${mdRender(q.join('\n'))}</blockquote>`
      continue
    }
    if (LI.test(l)) {
      flush()
      const items = []
      let m
      while (i < lines.length && (m = lines[i].match(LI))) {
        items.push({ ind: m[1].length, ord: /\d/.test(m[2]), text: m[3] })
        i++
      }
      html += mdList(items)
      continue
    }
    const sep = lines[i + 1]
    if (l.includes('|') && sep && /^[|\s:-]+$/.test(sep) && sep.includes('-') && sep.includes('|')) {
      flush()
      const row = (r) => r.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map((c) => c.trim())
      const cells = (r, tag) => r.map((c) => `<${tag}>${mdInline(c)}</${tag}>`).join('')
      html += `<table><thead><tr>${cells(row(l), 'th')}</tr></thead><tbody>`
      i += 2
      while (i < lines.length && lines[i].includes('|') && lines[i].trim()) {
        html += `<tr>${cells(row(lines[i++]), 'td')}</tr>`
      }
      html += '</tbody></table>'
      continue
    }
    para.push(l)
    i++
  }
  flush()
  return html
}

// ---------- mermaid ----------
// Loaded from the CDN only when a diagram actually shows up; offline (or on
// an invalid diagram) the fenced code block simply stays visible.
let mermaidP = null
function loadMermaid() {
  if (!mermaidP) {
    mermaidP = new Promise((resolve, reject) => {
      const s = document.createElement('script')
      s.src = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js'
      s.onload = () => {
        window.mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'strict' })
        resolve(window.mermaid)
      }
      s.onerror = () => reject(new Error('mermaid load failed'))
      document.head.appendChild(s)
    })
  }
  return mermaidP
}

// svg cache keyed by diagram source: streaming re-renders reset innerHTML on
// every delta, so already-rendered diagrams must come back instantly (and a
// null entry pins a diagram that failed, so we never retry in a loop).
const mmdCache = new Map()
const mmdPending = new Set()
let mmdSeq = 0
function applyMermaidCache() {
  for (const box of document.querySelectorAll('.mermaid-box:not(.rendered)')) {
    const svg = mmdCache.get(box.dataset.mmd)
    if (svg) { box.innerHTML = svg; box.classList.add('rendered') }
  }
}
async function renderMermaid(root) {
  applyMermaidCache()
  for (const box of root.querySelectorAll('.mermaid-box:not(.rendered)')) {
    const code = box.dataset.mmd
    if (mmdCache.has(code) || mmdPending.has(code)) continue
    mmdPending.add(code)
    const id = 'mmd' + (++mmdSeq)
    try {
      const mermaid = await loadMermaid()
      const { svg } = await mermaid.render(id, code)
      mmdCache.set(code, svg)
    } catch {
      mmdCache.set(code, null)
      document.getElementById('d' + id)?.remove()   // mermaid can leave its scratch node behind
    }
    mmdPending.delete(code)
    applyMermaidCache()
    scrollDown()
  }
}

// ---------- routing ----------
// Speaking URLs: #/<port> (session list) and #/<port>/<sessionId>/<title-slug>
// so a refresh (or a shared link) lands back on the same view.
function slug(t) {
  return String(t || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 48)
}
function deslug(s) {
  const t = String(s || '').replace(/-/g, ' ').trim()
  return t ? t[0].toUpperCase() + t.slice(1) : ''
}
function setHash(h) {
  if (location.hash !== h) location.hash = h
}
function route() {
  const parts = location.hash.replace(/^#\/?/, '').split('/').filter(Boolean)
  const seg0 = parts[0]
  const id = parts[1] || null
  if (seg0 === 'archived') {
    if (view !== 'archived') showArchived()
    return
  }
  if (id) {
    if (archived[id]) { showArchived(); return }   // archived: read-only, no opening
    const p = Number(seg0)
    if (p && instances.find((i) => i.port === p)) curPort = p
    if (current === id) return           // already showing it (e.g. slug added)
    showSession(id, titleMap[id] || (parts[2] ? deslug(parts[2]) : null))
    return
  }
  // list view: seg0 is 'all' or a port
  const wanted = (!seg0 || seg0 === 'all') ? 'all'
    : (instances.find((i) => i.port === Number(seg0)) ? String(Number(seg0)) : 'all')
  if (view === 'list' && wanted === scope) return
  scope = wanted
  localStorage.setItem('scope', scope)
  showList()
}
window.addEventListener('hashchange', route)

// ---------- transcript ----------
// Stick-to-bottom: on when a session opens, off as soon as the user scrolls
// up, back on when they return to the bottom. The ⇣ header button mirrors
// this state; tapping it jumps to the bottom and re-engages following.
let stick = true
function updateScrollBtn() {
  $('scrollBtn').classList.toggle('on', stick)
}
$('main').addEventListener('scroll', () => {
  const m = $('main')
  stick = m.scrollHeight - m.scrollTop - m.clientHeight < 60
  if (view === 'session') updateScrollBtn()
})
$('scrollBtn').onclick = () => {
  stick = true
  $('main').scrollTop = $('main').scrollHeight
  updateScrollBtn()
}
function scrollDown() {
  if (stick) $('main').scrollTop = $('main').scrollHeight
}
function addEl(el) { $('transcript').appendChild(el); scrollDown(); return el }
function bubble(cls, text) {
  const b = document.createElement('div')
  b.className = 'bubble ' + cls
  b.textContent = text
  return addEl(b)
}
// Assistant bubble rendered as markdown. _raw keeps the source so streaming
// can append and re-render (renderMd) on every delta.
function mdBubble(cls, raw) {
  const b = document.createElement('div')
  b.className = 'bubble md ' + cls
  b._raw = String(raw ?? '')
  addEl(b)
  renderMd(b)
  return b
}
function renderMd(el) {
  el.innerHTML = mdRender(el._raw)
  renderMermaid(el)
  scrollDown()
}
function infoLine(text, cls) {
  const l = document.createElement('div')
  l.className = 'line' + (cls ? ' ' + cls : '')
  l.textContent = text
  return addEl(l)
}

async function attach(id) {
  // Session not alive inside even-terminal → show the on-disk history
  try {
    await api('/api/status?provider=claude&sessionId=' + id)
  } catch {
    try {
      const { history } = await api(`/api/sessions/${id}/history?provider=claude&limit=10`)
      for (const h of history || []) {
        if (h.role === 'user') bubble('user dim', h.text)
        else mdBubble('assistant dim', h.text)
      }
      if (history && history.length) infoLine('— history · your next message resumes this session —')
    } catch { /* no history available */ }
  }
  openStream(id)
}

function openStream(id) {
  if (es) es.close()
  es = new EventSource(withInst(`/api/events?sessionId=${id}&needReplay=true`))
  es.onmessage = (e) => { try { handle(JSON.parse(e.data)) } catch {} }
  es.onerror = () => infoLine('stream connection lost — tap ↻ to reconnect', 'err')
}

const toolEls = new Map()
const permCards = []

// Transient "thinking…" indicator: even-terminal only signals think_start /
// think_end status events (it never streams thinking content), so all we can
// show is that Claude is reasoning.
let thinkingEl = null
function showThinking() {
  if (thinkingEl) return
  thinkingEl = document.createElement('div')
  thinkingEl.className = 'line thinking'
  thinkingEl.textContent = '🧠 thinking…'
  addEl(thinkingEl)
}
function hideThinking() {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null }
}

function handle(m) {
  switch (m.type) {
    case 'user_prompt':
      curAssistant = null; turnHadText = false
      bubble('user', m.text)
      break
    case 'text_delta':
      hideThinking()
      if (!curAssistant) curAssistant = mdBubble('assistant', '')
      curAssistant._raw += m.text
      renderMd(curAssistant)
      turnHadText = true
      break
    case 'tool_start': {
      hideThinking()
      curAssistant = null
      const t = document.createElement('div')
      t.className = 'tool'
      t.innerHTML = `<span class="spin"></span>`
      t.firstChild.textContent = '🔧 ' + m.name
      toolEls.set(m.toolId, t)
      addEl(t)
      break
    }
    case 'tool_end': {
      const t = toolEls.get(m.toolId) || addEl(Object.assign(document.createElement('div'), { className: 'tool' }))
      toolEls.delete(m.toolId)
      t.textContent = '✓ ' + (m.summary || m.name)
      const pre = document.createElement('pre')
      pre.textContent = JSON.stringify(m.detail?.input ?? {}, null, 1).slice(0, 2000) +
        '\n---\n' + String(m.detail?.output ?? '').slice(0, 2000)
      t.appendChild(pre)
      t.onclick = () => t.classList.toggle('open')
      scrollDown()
      break
    }
    case 'permission_request': permissionCard(m); break
    case 'permission_result':
      finishCards()
      infoLine(`${m.decision === 'denied' ? '✗ denied' : '✓ allowed'} — ${m.summary || m.toolName}`)
      break
    case 'user_question': questionCard(m); break
    case 'question_answer':
      finishCards()
      infoLine('answer sent: ' + Object.values(m.answers || {}).join(' · '))
      break
    case 'status':
      if (m.state === 'think_start') showThinking()
      else if (m.state === 'think_end') hideThinking()
      else if (['busy', 'idle', 'waiting'].includes(m.state)) {
        if (m.state === 'idle') hideThinking()
        setChip(m.state)
      }
      break
    case 'result': {
      hideThinking()
      curAssistant = null
      if (!turnHadText && m.text) mdBubble('assistant', m.text)
      const r = document.createElement('div')
      r.className = 'result'
      r.textContent = `${m.success ? '✓' : '✗'} ${m.turns} turn(s) · ${(m.durationMs / 1000).toFixed(0)}s · $${(m.costUsd ?? 0).toFixed(3)}`
      addEl(r)
      setChip('idle')
      // first reply of a brand-new session: grab its id
      if (!current && m.sessionId) {
        current = m.sessionId
        $('hSub').textContent = current.slice(0, 8)
        $('archBtn').style.display = ''
        // replaceState: update the URL without retriggering route()
        history.replaceState(null, '', `#/${curPort}/${current}`)
      }
      break
    }
    case 'error': infoLine('error: ' + m.message, 'err'); break
    case 'notification': infoLine(m.text || m.message || ''); break
    case 'task_progress': infoLine(m.text || m.message || m.status || 'working…'); break
    case 'running_stats': break // too chatty for the UI
  }
}

function finishCards() {
  for (const c of permCards.splice(0)) {
    c.classList.add('done')
    c.querySelectorAll('button').forEach((b) => (b.disabled = true))
  }
}

function permissionCard(m) {
  const card = document.createElement('div')
  card.className = 'card'
  card.innerHTML = `<h4>Permission — ${esc(m.toolName)}</h4><p>${esc(m.description || '')}${m.detail ? '\n' + esc(m.detail) : ''}</p><div class="opts"></div>`
  const opts = card.querySelector('.opts')
  for (const o of m.options || [{ text: 'Yes', key: 'allow' }, { text: 'No', key: 'deny' }]) {
    const b = document.createElement('button')
    b.textContent = o.text
    if (o.key === 'allow' || o.key === 'allowAlways') b.classList.add('primary')
    b.onclick = () => post('/api/permission-response', { sessionId: current, provider: 'claude', decision: o.key })
      .then(finishCards).catch((e) => infoLine('failed: ' + e.message, 'err'))
    opts.appendChild(b)
  }
  permCards.push(card)
  addEl(card)
}

function questionCard(m) {
  const answers = {}
  const total = (m.questions || []).length
  const card = document.createElement('div')
  card.className = 'card'
  for (const q of m.questions || []) {
    const h = document.createElement('h4'); h.textContent = q.header || 'Question'
    const p = document.createElement('p'); p.textContent = q.question
    const opts = document.createElement('div'); opts.className = 'opts'
    for (const o of q.options || []) {
      const b = document.createElement('button')
      b.innerHTML = `${esc(o.label)}${o.description ? `<small>${esc(o.description)}</small>` : ''}`
      b.onclick = () => {
        answers[q.question || q.header] = o.label
        opts.querySelectorAll('button').forEach((x) => (x.disabled = true))
        b.disabled = false; b.classList.add('primary')
        if (Object.keys(answers).length >= total) {
          post('/api/question-response', { sessionId: current, provider: 'claude', answer: JSON.stringify(answers) })
            .then(finishCards).catch((e) => infoLine('failed: ' + e.message, 'err'))
        }
      }
      opts.appendChild(b)
    }
    card.append(h, p, opts)
  }
  permCards.push(card)
  addEl(card)
}

// ---------- attachments ----------
// Screenshots and zips are uploaded to the companion, which returns an
// absolute path; we reference those paths in the prompt so Claude Code
// reads (or unzips) them itself.
let attachments = []   // { path, thumb, kind: 'image'|'zip', status: 'up'|'done'|'err', name }

const isZip = (file) =>
  /\.zip$/i.test(file.name || '') || /^application\/(zip|x-zip-compressed)$/.test(file.type)

function renderAttachments() {
  const box = $('attachments')
  box.innerHTML = ''
  box.style.display = attachments.length ? 'flex' : 'none'
  attachments.forEach((a, i) => {
    const el = document.createElement('div')
    el.className = 'att' + (a.kind === 'zip' ? ' file' : '') +
      (a.status === 'up' ? ' up' : '') + (a.status === 'err' ? ' err' : '')
    el.innerHTML = a.kind === 'zip'
      ? `<span>🗜</span><span class="fname"></span><button class="x" title="Remove attachment">✕</button>`
      : `<img src="${a.thumb}"><button class="x" title="Remove attachment">✕</button>`
    if (a.kind === 'zip') el.querySelector('.fname').textContent = a.name
    el.querySelector('.x').onclick = () => { attachments.splice(i, 1); renderAttachments() }
    box.appendChild(el)
  })
}

// Upload one image or zip blob/File through the shared attachment flow.
async function addFile(file) {
  if (!file) return
  const zip = isZip(file)
  if (!zip && !file.type.startsWith('image/')) return
  let dataUrl = await new Promise((r) => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(file) })
  // Pickers may hand zips over as octet-stream — normalize so the server
  // doesn't have to guess from the mime alone.
  if (zip) dataUrl = dataUrl.replace(/^data:[^;]*;/, 'data:application/zip;')
  const a = { path: null, thumb: zip ? null : dataUrl, kind: zip ? 'zip' : 'image', status: 'up', name: file.name || 'pasted' }
  attachments.push(a)
  renderAttachments()
  try {
    const r = await fetch('/companion/upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dataUrl, name: a.name }),
    }).then((x) => x.json())
    if (r.error) throw new Error(r.error)
    a.path = r.path; a.status = 'done'
  } catch (err) {
    a.status = 'err'; infoLine('upload failed: ' + err.message, 'err')
  }
  renderAttachments()
}

$('attachBtn').onclick = () => $('fileInput').click()
$('fileInput').onchange = async (e) => {
  for (const file of [...e.target.files]) await addFile(file)
  e.target.value = ''   // allow re-picking the same file
}

// Paste an image straight into the composer (Ctrl/Cmd+V) — only meaningful in
// a session, and only when the clipboard actually carries an image or a file.
$('input').addEventListener('paste', (e) => {
  const items = [...(e.clipboardData?.items || [])]
    .filter((it) => it.kind === 'file' && (it.type.startsWith('image/') || /zip/.test(it.type)))
  if (!items.length) return
  e.preventDefault()          // don't drop the file's junk text into the field
  for (const it of items) { const f = it.getAsFile(); if (f) addFile(f) }
})

// ---------- sending ----------
async function send() {
  const typed = $('input').value.trim()
  const files = attachments.filter((a) => a.status === 'done' && a.path)
  if (!typed && !files.length) return
  if (attachments.some((a) => a.status === 'up')) { infoLine('waiting for upload…'); return }
  let text = typed
  if (files.length) {
    const list = files.map((a) =>
      '- ' + a.path + (a.kind === 'zip' && a.name ? ` (zip archive: ${a.name})` : '')).join('\n')
    const hasZip = files.some((a) => a.kind === 'zip')
    text = (typed ? typed + '\n\n' : `Please look at the attached ${hasZip ? 'file(s)' : 'screenshot(s)'}.\n\n`) +
      (hasZip
        ? 'Attached file(s) — read the images directly; unzip archives into a temp directory to inspect them:\n'
        : 'Attached image file(s) — read them:\n') + list
  }
  $('input').value = ''
  $('input').style.height = 'auto'
  attachments = []
  renderAttachments()
  setChip('busy')
  try {
    const body = { text, provider: 'claude' }
    if (current) body.sessionId = current
    else if (pendingCwd) body.cwd = pendingCwd
    const r = await post('/api/prompt', body)
    if (!current && r.sessionId) {
      current = r.sessionId
      $('hSub').textContent = current.slice(0, 8)
      $('archBtn').style.display = ''
      history.replaceState(null, '', `#/${curPort}/${current}`)
      openStream(current)   // SSE replay will replay user_prompt
    } else if (!es) {
      openStream(current)
    }
  } catch (err) {
    infoLine('failed to send: ' + err.message, 'err')
    setChip('idle')
  }
}

$('sendBtn').onclick = send
$('input').addEventListener('input', function () {
  this.style.height = 'auto'
  this.style.height = Math.min(this.scrollHeight, 130) + 'px'
})
// Desktop: Ctrl+Enter (or Cmd+Enter) submits
$('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault()
    send()
  }
})
$('backBtn').onclick = showList
// Tap the title of an open session to rename it (local override).
$('hTitle').onclick = () => {
  if (view !== 'session' || !current) return
  const s = allSessions.find((x) => x.id === current)
  const nt = renameSession(current, s && s.title, $('hTitle').textContent)
  if (nt === null) return
  $('hTitle').textContent = nt
  history.replaceState(null, '', `#/${curPort}/${current}/${slug(nt)}`)
}
// Archive the open conversation and drop back to the list. Metadata comes
// from the aggregated list when available, else from what the header shows.
$('archBtn').onclick = () => {
  if (!current) return
  const s = allSessions.find((x) => x.id === current)
  const inst = currentInst()
  archived[current] = {
    title: titleMap[current] || (s && s.title) || $('hTitle').textContent || null,
    proj: (s && s._proj) || (inst ? projName(inst) : null),
    ts: (s && s.timestamp) || null,
  }
  saveOverrides()
  showList()
}
$('refreshBtn').onclick = () => {
  loadInstances()
  if (current) openStream(current)
  else loadOverrides().then(loadSessions)   // pick up changes made on other devices
}
$('newBtn').onclick = () => {
  const inst = (scope !== 'all' && instances.find((i) => i.port === Number(scope))) || instances[0]
  if (!inst) return
  curPort = inst.port
  pendingCwd = prompt(`Project directory? (${projName(inst)} · :${inst.port})`, inst.cwd || '') || null
  if (pendingCwd === null) return
  showSession(null, 'New session')
}
$('stopBtn').onclick = () => current && post('/api/interrupt', { sessionId: current, provider: 'claude' })
  .then(() => infoLine('interrupt requested'))
  .catch((e) => infoLine('failed: ' + e.message, 'err'))

// ---------- boot ----------
// Overrides must be in before route(): it decides archived-vs-open by id.
Promise.all([loadInstances(), loadOverrides()]).then(route)
</script>
</body>
</html>
