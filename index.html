<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>eveng2-terminal-textinput</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #2d333b;
    --fg: #e6edf3; --dim: #8b949e; --accent: #4bb7c3;
    --user: #1f3d45; --green: #3fb950; --red: #f85149; --amber: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font: 15px/1.45 -apple-system, "SF Pro Text", system-ui, sans-serif;
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  header .title { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header .sub { color: var(--dim); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #instSel {
    display: block; width: 100%; background: none; border: none; padding: 0;
    color: var(--accent); font-size: 12px; font-family: inherit;
  }
  button {
    background: var(--panel); color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { background: var(--border); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #06262b; font-weight: 600; }
  button:disabled { opacity: .45; }
  .chip { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--dim); flex-shrink: 0; }
  .chip.busy { color: var(--amber); border-color: var(--amber); }
  .chip.idle { color: var(--green); border-color: var(--green); }
  .chip.waiting { color: var(--accent); border-color: var(--accent); }

  main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* ---- session list ---- */
  #sessionList .row {
    padding: 13px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; cursor: pointer;
  }
  #sessionList .row:active { background: var(--panel); }
  #sessionList .meta { flex: 1; min-width: 0; }
  #sessionList .t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #sessionList .d { color: var(--dim); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { padding: 32px 16px; text-align: center; color: var(--dim); }

  /* ---- transcript ---- */
  #transcript { padding: 12px 12px 4px; display: flex; flex-direction: column; gap: 8px; }
  .bubble { border-radius: 12px; padding: 9px 12px; max-width: 92%; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
  .bubble.user { background: var(--user); align-self: flex-end; }
  .bubble.assistant { background: var(--panel); align-self: flex-start; }
  .bubble.dim { opacity: .55; }
  .line { color: var(--dim); font-size: 12.5px; padding: 0 4px; word-break: break-word; }
  .line.err { color: var(--red); }
  .line.thinking { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  .tool { font-size: 12.5px; color: var(--dim); background: var(--panel); border: 1px solid var(--border);
          border-radius: 8px; padding: 6px 10px; align-self: flex-start; max-width: 92%; cursor: pointer; }
  .tool .spin::after { content: "…"; }
  .tool pre { margin-top: 6px; font-size: 11px; color: var(--fg); overflow-x: auto; max-height: 200px; overflow-y: auto; display: none; }
  .tool.open pre { display: block; }
  .card { background: var(--panel); border: 1px solid var(--accent); border-radius: 12px; padding: 12px; }
  .card h4 { font-size: 13px; margin-bottom: 4px; color: var(--accent); }
  .card p { font-size: 13.5px; margin-bottom: 10px; white-space: pre-wrap; }
  .card .opts { display: flex; flex-direction: column; gap: 8px; }
  .card .opts button { text-align: left; }
  .card .opts button small { display: block; color: var(--dim); font-weight: 400; }
  .card.done { border-color: var(--border); opacity: .6; }
  .result { font-size: 11.5px; color: var(--dim); text-align: center; padding: 4px 0 8px; }

  /* ---- composer ---- */
  #composer {
    display: none; gap: 8px; align-items: flex-end; flex-shrink: 0;
    padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px);
    background: var(--panel); border-top: 1px solid var(--border);
  }
  #composer textarea {
    flex: 1; resize: none; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px;
    font: inherit; max-height: 130px; min-height: 40px;
  }
  #composer textarea:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <button id="backBtn" style="display:none">‹</button>
  <div style="flex:1;min-width:0">
    <div class="title" id="hTitle">Even Terminal — text input</div>
    <div class="sub" id="hSub" style="display:none"></div>
    <select id="instSel"><option>connecting…</option></select>
  </div>
  <span class="chip" id="statusChip" style="display:none">idle</span>
  <button id="stopBtn" style="display:none">■</button>
  <button id="refreshBtn">↻</button>
  <button id="newBtn" class="primary">＋</button>
</header>

<main id="main">
  <div id="sessionList"></div>
  <div id="transcript" style="display:none"></div>
</main>

<div id="composer">
  <textarea id="input" rows="1" placeholder="Message Claude… (Ctrl+Enter to send)"></textarea>
  <button id="sendBtn" class="primary">Send</button>
</div>

<script>
'use strict'
const $ = (id) => document.getElementById(id)
// Every /api/* call is stamped with the selected even-terminal instance
const withInst = (path) => {
  const i = currentInst()
  if (!i || !path.startsWith('/api/')) return path
  return path + (path.includes('?') ? '&' : '?') + '_inst=' + i.port
}
const api = (path, opts) => fetch(withInst(path), opts).then(async (r) => {
  const body = await r.json().catch(() => ({}))
  if (!r.ok && !(r.status === 202)) throw new Error(body.error || r.status)
  return body
})
const post = (path, body) => api(path, {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(body),
})

let instances = []           // live even-terminal instances
let instPort = Number(localStorage.getItem('instPort')) || null
let view = null              // 'list' | 'session'
let current = null           // open sessionId (null = list view)
let es = null                // EventSource
let curAssistant = null      // assistant bubble currently streaming
let turnHadText = false
let pendingCwd = null        // cwd of a new session awaiting its id

// ---------- header / navigation ----------
function showList() {
  view = 'list'
  current = null
  if (es) { es.close(); es = null }
  $('transcript').style.display = 'none'
  $('sessionList').style.display = ''
  $('composer').style.display = 'none'
  $('backBtn').style.display = 'none'
  $('stopBtn').style.display = 'none'
  $('statusChip').style.display = 'none'
  $('newBtn').style.display = ''
  $('hTitle').textContent = 'Even Terminal — text input'
  $('hSub').style.display = 'none'
  $('instSel').style.display = ''
  if (instPort) setHash(`#/${instPort}`)
  loadSessions()
}

function showSession(id, title) {
  view = 'session'
  current = id                       // null for a session not created yet
  $('sessionList').style.display = 'none'
  $('transcript').style.display = ''
  $('transcript').innerHTML = ''
  $('composer').style.display = 'flex'
  $('backBtn').style.display = ''
  $('stopBtn').style.display = ''
  $('statusChip').style.display = ''
  $('newBtn').style.display = 'none'
  $('hTitle').textContent = title || 'New session'
  $('instSel').style.display = 'none'
  $('hSub').style.display = ''
  const inst = currentInst()
  $('hSub').textContent = (id ? id.slice(0, 8) : (pendingCwd || (inst && inst.cwd) || '')) +
    (inst ? ` · :${inst.port}` : '')
  setChip('idle')
  curAssistant = null
  thinkingEl = null   // transcript was cleared with innerHTML above
  stick = true        // always land at the bottom when joining a session
  if (id) {
    setHash(`#/${instPort}/${id}${title ? '/' + slug(title) : ''}`)
    attach(id)
  }
  $('input').focus()
}

function setChip(state) {
  const c = $('statusChip')
  c.textContent = state
  c.className = 'chip ' + state
}

// ---------- instances ----------
function currentInst() {
  return instances.find((i) => i.port === instPort) || instances[0] || null
}

async function loadInstances() {
  try {
    instances = await fetch('/companion/instances').then((r) => r.json())
  } catch { instances = [] }
  if (!instances.find((i) => i.port === instPort)) instPort = instances[0]?.port ?? null
  const sel = $('instSel')
  sel.innerHTML = ''
  if (!instances.length) {
    sel.appendChild(new Option('⚠ even-terminal is not running', ''))
    return
  }
  for (const i of instances) {
    const name = shortPath(i.cwd).split('/').pop() || i.cwd
    sel.appendChild(new Option(`${name} · :${i.port} ▾`, i.port))
  }
  sel.value = String(instPort)
}

$('instSel').onchange = () => {
  instPort = Number($('instSel').value) || null
  localStorage.setItem('instPort', instPort ?? '')
  showList()
}

// ---------- session list ----------
async function loadSessions() {
  const box = $('sessionList')
  box.innerHTML = '<div class="empty">loading…</div>'
  try {
    const { sessions, error } = await api('/api/sessions?provider=claude&limit=20')
    if (error) throw new Error(error)
    if (!sessions.length) { box.innerHTML = '<div class="empty">No Claude Code sessions found.</div>'; return }
    box.innerHTML = ''
    for (const s of sessions) {
      const row = document.createElement('div')
      row.className = 'row'
      const when = s.timestamp ? relTime(new Date(s.timestamp)) : ''
      row.innerHTML = `<div class="meta"><div class="t"></div><div class="d"></div></div>` +
        (s.status ? `<span class="chip ${esc(s.status)}">${esc(s.status)}</span>` : '')
      row.querySelector('.t').textContent = s.title || s.id.slice(0, 8)
      row.querySelector('.d').textContent = `${when} · ${shortPath(s.cwd)}`
      row.onclick = () => showSession(s.id, s.title)
      box.appendChild(row)
    }
  } catch (err) {
    box.innerHTML = `<div class="empty">Error: ${esc(err.message)}<br><br><button onclick="loadSessions()">retry</button></div>`
  }
}

function relTime(d) {
  const s = Math.floor((Date.now() - d.getTime()) / 1000)
  if (s < 60) return 'just now'
  if (s < 3600) return Math.floor(s / 60) + 'm ago'
  if (s < 86400) return Math.floor(s / 3600) + 'h ago'
  return Math.floor(s / 86400) + 'd ago'
}
function shortPath(p) { return (p || '').replace(/^\/Users\/[^/]+/, '~') }
function esc(t) { const d = document.createElement('div'); d.textContent = String(t ?? ''); return d.innerHTML }

// ---------- routing ----------
// Speaking URLs: #/<port> (session list) and #/<port>/<sessionId>/<title-slug>
// so a refresh (or a shared link) lands back on the same view.
function slug(t) {
  return String(t || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 48)
}
function deslug(s) {
  const t = String(s || '').replace(/-/g, ' ').trim()
  return t ? t[0].toUpperCase() + t.slice(1) : ''
}
function setHash(h) {
  if (location.hash !== h) location.hash = h
}
function route() {
  const parts = location.hash.replace(/^#\/?/, '').split('/').filter(Boolean)
  const port = Number(parts[0]) || null
  const id = parts[1] || null
  if (port && port !== instPort && instances.find((i) => i.port === port)) {
    instPort = port
    localStorage.setItem('instPort', port)
    $('instSel').value = String(port)
  }
  if (id) {
    if (current === id) return           // already showing it (e.g. slug added)
    showSession(id, parts[2] ? deslug(parts[2]) : null)
  } else {
    if (view === 'list' && port === instPort) return
    showList()
  }
}
window.addEventListener('hashchange', route)

// ---------- transcript ----------
// Stick-to-bottom: on when a session opens, off as soon as the user scrolls
// up, back on when they return to the bottom.
let stick = true
$('main').addEventListener('scroll', () => {
  const m = $('main')
  stick = m.scrollHeight - m.scrollTop - m.clientHeight < 60
})
function scrollDown() {
  if (stick) $('main').scrollTop = $('main').scrollHeight
}
function addEl(el) { $('transcript').appendChild(el); scrollDown(); return el }
function bubble(cls, text) {
  const b = document.createElement('div')
  b.className = 'bubble ' + cls
  b.textContent = text
  return addEl(b)
}
function infoLine(text, cls) {
  const l = document.createElement('div')
  l.className = 'line' + (cls ? ' ' + cls : '')
  l.textContent = text
  return addEl(l)
}

async function attach(id) {
  // Session not alive inside even-terminal → show the on-disk history
  try {
    await api('/api/status?provider=claude&sessionId=' + id)
  } catch {
    try {
      const { history } = await api(`/api/sessions/${id}/history?provider=claude&limit=10`)
      for (const h of history || []) {
        bubble((h.role === 'user' ? 'user' : 'assistant') + ' dim', h.text)
      }
      if (history && history.length) infoLine('— history · your next message resumes this session —')
    } catch { /* no history available */ }
  }
  openStream(id)
}

function openStream(id) {
  if (es) es.close()
  es = new EventSource(withInst(`/api/events?sessionId=${id}&needReplay=true`))
  es.onmessage = (e) => { try { handle(JSON.parse(e.data)) } catch {} }
  es.onerror = () => infoLine('stream connection lost — tap ↻ to reconnect', 'err')
}

const toolEls = new Map()
const permCards = []

// Transient "thinking…" indicator: even-terminal only signals think_start /
// think_end status events (it never streams thinking content), so all we can
// show is that Claude is reasoning.
let thinkingEl = null
function showThinking() {
  if (thinkingEl) return
  thinkingEl = document.createElement('div')
  thinkingEl.className = 'line thinking'
  thinkingEl.textContent = '🧠 thinking…'
  addEl(thinkingEl)
}
function hideThinking() {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null }
}

function handle(m) {
  switch (m.type) {
    case 'user_prompt':
      curAssistant = null; turnHadText = false
      bubble('user', m.text)
      break
    case 'text_delta':
      hideThinking()
      if (!curAssistant) curAssistant = bubble('assistant', '')
      curAssistant.textContent += m.text
      turnHadText = true
      scrollDown()
      break
    case 'tool_start': {
      hideThinking()
      curAssistant = null
      const t = document.createElement('div')
      t.className = 'tool'
      t.innerHTML = `<span class="spin"></span>`
      t.firstChild.textContent = '🔧 ' + m.name
      toolEls.set(m.toolId, t)
      addEl(t)
      break
    }
    case 'tool_end': {
      const t = toolEls.get(m.toolId) || addEl(Object.assign(document.createElement('div'), { className: 'tool' }))
      toolEls.delete(m.toolId)
      t.textContent = '✓ ' + (m.summary || m.name)
      const pre = document.createElement('pre')
      pre.textContent = JSON.stringify(m.detail?.input ?? {}, null, 1).slice(0, 2000) +
        '\n---\n' + String(m.detail?.output ?? '').slice(0, 2000)
      t.appendChild(pre)
      t.onclick = () => t.classList.toggle('open')
      scrollDown()
      break
    }
    case 'permission_request': permissionCard(m); break
    case 'permission_result':
      finishCards()
      infoLine(`${m.decision === 'denied' ? '✗ denied' : '✓ allowed'} — ${m.summary || m.toolName}`)
      break
    case 'user_question': questionCard(m); break
    case 'question_answer':
      finishCards()
      infoLine('answer sent: ' + Object.values(m.answers || {}).join(' · '))
      break
    case 'status':
      if (m.state === 'think_start') showThinking()
      else if (m.state === 'think_end') hideThinking()
      else if (['busy', 'idle', 'waiting'].includes(m.state)) {
        if (m.state === 'idle') hideThinking()
        setChip(m.state)
      }
      break
    case 'result': {
      hideThinking()
      curAssistant = null
      if (!turnHadText && m.text) bubble('assistant', m.text)
      const r = document.createElement('div')
      r.className = 'result'
      r.textContent = `${m.success ? '✓' : '✗'} ${m.turns} turn(s) · ${(m.durationMs / 1000).toFixed(0)}s · $${(m.costUsd ?? 0).toFixed(3)}`
      addEl(r)
      setChip('idle')
      // first reply of a brand-new session: grab its id
      if (!current && m.sessionId) {
        current = m.sessionId
        $('hSub').textContent = current.slice(0, 8)
        // replaceState: update the URL without retriggering route()
        history.replaceState(null, '', `#/${instPort}/${current}`)
      }
      break
    }
    case 'error': infoLine('error: ' + m.message, 'err'); break
    case 'notification': infoLine(m.text || m.message || ''); break
    case 'task_progress': infoLine(m.text || m.message || m.status || 'working…'); break
    case 'running_stats': break // too chatty for the UI
  }
}

function finishCards() {
  for (const c of permCards.splice(0)) {
    c.classList.add('done')
    c.querySelectorAll('button').forEach((b) => (b.disabled = true))
  }
}

function permissionCard(m) {
  const card = document.createElement('div')
  card.className = 'card'
  card.innerHTML = `<h4>Permission — ${esc(m.toolName)}</h4><p>${esc(m.description || '')}${m.detail ? '\n' + esc(m.detail) : ''}</p><div class="opts"></div>`
  const opts = card.querySelector('.opts')
  for (const o of m.options || [{ text: 'Yes', key: 'allow' }, { text: 'No', key: 'deny' }]) {
    const b = document.createElement('button')
    b.textContent = o.text
    if (o.key === 'allow' || o.key === 'allowAlways') b.classList.add('primary')
    b.onclick = () => post('/api/permission-response', { sessionId: current, provider: 'claude', decision: o.key })
      .then(finishCards).catch((e) => infoLine('failed: ' + e.message, 'err'))
    opts.appendChild(b)
  }
  permCards.push(card)
  addEl(card)
}

function questionCard(m) {
  const answers = {}
  const total = (m.questions || []).length
  const card = document.createElement('div')
  card.className = 'card'
  for (const q of m.questions || []) {
    const h = document.createElement('h4'); h.textContent = q.header || 'Question'
    const p = document.createElement('p'); p.textContent = q.question
    const opts = document.createElement('div'); opts.className = 'opts'
    for (const o of q.options || []) {
      const b = document.createElement('button')
      b.innerHTML = `${esc(o.label)}${o.description ? `<small>${esc(o.description)}</small>` : ''}`
      b.onclick = () => {
        answers[q.question || q.header] = o.label
        opts.querySelectorAll('button').forEach((x) => (x.disabled = true))
        b.disabled = false; b.classList.add('primary')
        if (Object.keys(answers).length >= total) {
          post('/api/question-response', { sessionId: current, provider: 'claude', answer: JSON.stringify(answers) })
            .then(finishCards).catch((e) => infoLine('failed: ' + e.message, 'err'))
        }
      }
      opts.appendChild(b)
    }
    card.append(h, p, opts)
  }
  permCards.push(card)
  addEl(card)
}

// ---------- sending ----------
async function send() {
  const text = $('input').value.trim()
  if (!text) return
  $('input').value = ''
  $('input').style.height = 'auto'
  setChip('busy')
  try {
    const body = { text, provider: 'claude' }
    if (current) body.sessionId = current
    else if (pendingCwd) body.cwd = pendingCwd
    const r = await post('/api/prompt', body)
    if (!current && r.sessionId) {
      current = r.sessionId
      $('hSub').textContent = current.slice(0, 8)
      history.replaceState(null, '', `#/${instPort}/${current}`)
      openStream(current)   // SSE replay will replay user_prompt
    } else if (!es) {
      openStream(current)
    }
  } catch (err) {
    infoLine('failed to send: ' + err.message, 'err')
    setChip('idle')
  }
}

$('sendBtn').onclick = send
$('input').addEventListener('input', function () {
  this.style.height = 'auto'
  this.style.height = Math.min(this.scrollHeight, 130) + 'px'
})
// Desktop: Ctrl+Enter (or Cmd+Enter) submits
$('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault()
    send()
  }
})
$('backBtn').onclick = showList
$('refreshBtn').onclick = () => { loadInstances(); current ? (openStream(current)) : loadSessions() }
$('newBtn').onclick = () => {
  const inst = currentInst()
  pendingCwd = prompt('Project directory?', (inst && inst.cwd) || '') || null
  if (pendingCwd === null) return
  showSession(null, 'New session')
}
$('stopBtn').onclick = () => current && post('/api/interrupt', { sessionId: current, provider: 'claude' })
  .then(() => infoLine('interrupt requested'))
  .catch((e) => infoLine('failed: ' + e.message, 'err'))

// ---------- boot ----------
loadInstances().then(route)   // restore the view encoded in the URL hash
</script>
</body>
</html>
